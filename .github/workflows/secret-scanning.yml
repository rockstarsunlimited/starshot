name: Secret Scanning

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number)
      || github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id)
      || format('push-{0}', github.sha)
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          LOG_OPTS="-n 1"
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "${BASE_SHA:-}" ] && [ -n "${HEAD_SHA:-}" ]; then
            LOG_OPTS="${BASE_SHA}..${HEAD_SHA}"
          elif [ "$EVENT_NAME" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            LOG_OPTS="${BEFORE_SHA}..${CURRENT_SHA}"
          fi
          echo "Running gitleaks with log range: $LOG_OPTS"
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git --config .gitleaks.toml --log-opts="$LOG_OPTS" --report-format sarif --report-path gitleaks-results.sarif --exit-code 1

      - name: Upload gitleaks SARIF artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-results.sarif
          path: gitleaks-results.sarif
          if-no-files-found: ignore

  trufflehog:
    name: trufflehog
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: trufflehog
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6
        with:
          path: ./
          extra_args: --only-verified
