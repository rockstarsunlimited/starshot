name: CI

permissions:
  contents: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number)
      || github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id)
      || format('push-{0}', github.sha)
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  rust-worker:
    name: rust-worker
    if: github.event_name != 'pull_request'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo
        uses: useblacksmith/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Rust checks
        run: |
          cargo fmt --check
          cargo test
          cargo clippy --all-targets --target wasm32-unknown-unknown -- -D warnings
          cargo check --target wasm32-unknown-unknown

      - name: Worker build
        run: |
          cargo install -q worker-build
          worker-build --release

  local-tooling:
    name: local-tooling
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: JavaScript and shell checks
        run: |
          bun run typecheck
          bun build bin/starshot.ts scripts/setup-starshot.ts scripts/agent-screenshot.ts scripts/list-urls.ts scripts/sync-queue.ts --target bun --outdir /tmp/starshot-check
          rm -rf /tmp/starshot-check
          sh -n scripts/install-macos-finder-service.sh
          sh -n scripts/macos-finder-upload.sh

      - name: Varlock scan
        run: bun run scan
